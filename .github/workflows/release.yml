name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: "Optional semver override without v prefix (e.g. 0.2.0). Leave empty to auto-bump patch."
        required: false
        type: string

concurrency:
  group: release-main
  cancel-in-progress: true

jobs:
  plan:
    name: Plan release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - id: version
        env:
          MANUAL_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
        run: node scripts/next-version.mjs

  verify:
    name: Verify (CI)
    needs: plan
    if: needs.plan.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm build
      - run: pnpm test
      - run: pnpm build:presets
      - run: git diff --exit-code -- packages/behavior-packs/presets presets

  build-studio:
    name: Studio (${{ matrix.label }})
    needs: [plan, verify]
    if: needs.plan.outputs.should_release == 'true'
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ needs.plan.outputs.release_tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            platform: windows
            args: ""
          - os: ubuntu-22.04
            label: linux-x64
            platform: linux
            args: ""
          - os: macos-latest
            label: macos-universal
            platform: macos
            args: "--target universal-apple-darwin"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Add macOS universal targets
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set version from tag
        env:
          VERSION: ${{ env.RELEASE_TAG }}
        run: node scripts/set-version.mjs

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Build PuppetFlow Studio
        run: pnpm --filter @puppetflow/studio exec tauri build ${{ matrix.args }} --bundles app
        env:
          CI: true

      - name: Package portable Studio
        shell: bash
        run: |
          node scripts/package-portable-studio.mjs "${{ matrix.platform }}" "${{ matrix.label }}" "$RELEASE_TAG" dist-artifacts/studio

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: studio-${{ matrix.label }}
          path: dist-artifacts/studio/*
          if-no-files-found: error

  build-cli:
    name: CLI (${{ matrix.label }})
    needs: [plan, verify]
    if: needs.plan.outputs.should_release == 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
          - os: ubuntu-22.04
            label: linux-x64
          - os: macos-latest
            label: macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          pnpm --filter @puppetflow/cli deploy --prod deploy/pf-cli
          mkdir -p dist-artifacts
          cd deploy/pf-cli && zip -r "../../dist-artifacts/pf-cli-${{ matrix.label }}.zip" .

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pnpm --filter @puppetflow/cli deploy --prod deploy/pf-cli
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null
          Compress-Archive -Path deploy/pf-cli/* -DestinationPath "dist-artifacts/pf-cli-${{ matrix.label }}.zip" -Force

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pf-cli-${{ matrix.label }}
          path: dist-artifacts/pf-cli-${{ matrix.label }}.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [plan, build-studio, build-cli]
    if: needs.plan.outputs.should_release == 'true'
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ needs.plan.outputs.release_tag }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release assets
        run: node scripts/prepare-release-assets.mjs artifacts release

      - name: List release files
        run: find release -type f | sort

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: PuppetFlow ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          generate_release_notes: true
          body: |
            ## PuppetFlow Studio

            Portable desktop app (Tauri). Download the ZIP for your OS, extract it, and run the app:

            - **Windows** — extract and run `puppetflow-studio.exe` (WebView2 required)
            - **Linux** — extract and run `./puppetflow-studio` (Ubuntu 22.04 build)
            - **macOS** — extract `PuppetFlow Studio.app` and open it (Universal: Apple Silicon + Intel)

            Unsigned macOS builds may require right-click → Open the first time.

            ## CLI (`pf`)

            Headless runtime bundle. **Requires Node.js 22+** on the target machine.

            ```bash
            unzip pf-cli-<platform>.zip -d pf-cli
            cd pf-cli
            node dist/cli.js run --help
            ```

            Or from a git checkout: `pnpm pf run --preset Curious`

            See [CLI guide](https://github.com/ludi-uni/PuppetFlow/blob/main/docs/guides/cli.md).
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

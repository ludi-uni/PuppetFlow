name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-studio:
    name: Studio (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            args: ""
            bundle: apps/studio/src-tauri/target/release/bundle/**/*
          - os: ubuntu-22.04
            label: linux-x64
            args: ""
            bundle: apps/studio/src-tauri/target/release/bundle/**/*
          - os: macos-latest
            label: macos-universal
            args: "--target universal-apple-darwin"
            bundle: apps/studio/src-tauri/target/universal-apple-darwin/release/bundle/**/*

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set version from tag
        run: node scripts/set-version.mjs "${{ github.ref_name }}"

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Build PuppetFlow Studio
        run: pnpm --filter @puppetflow/studio exec tauri build ${{ matrix.args }}
        env:
          CI: true

      - uses: actions/upload-artifact@v7
        with:
          name: studio-${{ matrix.label }}
          path: ${{ matrix.bundle }}
          if-no-files-found: error

  build-cli:
    name: CLI (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
          - os: ubuntu-22.04
            label: linux-x64
          - os: macos-latest
            label: macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          pnpm --filter @puppetflow/cli deploy --prod deploy/pf-cli
          mkdir -p dist-artifacts
          cd deploy/pf-cli && zip -r "../../dist-artifacts/pf-cli-${{ matrix.label }}.zip" .

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pnpm --filter @puppetflow/cli deploy --prod deploy/pf-cli
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null
          Compress-Archive -Path deploy/pf-cli/* -DestinationPath "dist-artifacts/pf-cli-${{ matrix.label }}.zip" -Force

      - uses: actions/upload-artifact@v7
        with:
          name: pf-cli-${{ matrix.label }}
          path: dist-artifacts/pf-cli-${{ matrix.label }}.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [build-studio, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: find artifacts -type f | sort

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: PuppetFlow ${{ github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## PuppetFlow Studio

            Desktop authoring app (Tauri). Pick the installer for your OS:

            - **Windows** — `.msi` or `.exe` (NSIS)
            - **Linux** — `.deb` or `.AppImage` (built on Ubuntu 22.04)
            - **macOS** — `.dmg` (Universal: Apple Silicon + Intel)

            Unsigned macOS builds may require right-click → Open the first time.

            ## CLI (`pf`)

            Headless runtime bundle. **Requires Node.js 22+** on the target machine.

            ```bash
            unzip pf-cli-<platform>.zip -d pf-cli
            cd pf-cli
            node dist/cli.js run --help
            ```

            Or from a git checkout: `pnpm pf run --preset Curious`

            See [CLI guide](https://github.com/ludi-uni/PuppetFlow/blob/main/docs/guides/cli.md).
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
